name: Build site files

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    # github-actions가 만든 커밋이면 다시 빌드하지 않음 (무한루프 방지)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build index and sitemap
        run: python tools/build.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml
          git diff --staged --quiet || git commit -m "Auto build index and sitemap"
      
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 변경이 없으면 push 안 함
          git log -1 --pretty=%B | grep -q "Auto build index and sitemap" || exit 0
          git push
