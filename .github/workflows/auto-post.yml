name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *" # 매일 01:20 UTC (KST 10:20)

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean invisible spaces in auto_post.py
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/auto_post.py")
          text = path.read_text(encoding="utf-8")

          text = text.replace("\u00A0", " ")
          text = text.replace("\u2007", " ")
          text = text.replace("\u202F", " ")

          path.write_text(text, encoding="utf-8")
          print("Cleaned invisible spaces from", path)
          PY

      - name: Check syntax
        run: |
          python -m py_compile tools/auto_post.py

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}

          SITE_NAME: "MingMong"
          SITE_URL: "https://mingmonglife.com"

          POSTS_PER_RUN: "3"
          MODEL: "gpt-4o-mini"

          MIN_CHARS: "4500"
          MIN_SECTION_CHARS: "350"
          MAX_SECTION_CHARS: "1000"
          MAX_CHARS: "5400"
          
          MAX_KEYWORD_TRIES: "100"
          MAX_GENERATE_ATTEMPTS: "10"

          TITLE_SIM_THRESHOLD: "0.88"
          KEYWORD_SIM_THRESHOLD: "0.82"

          AUTO_KEYWORD_BATCH: "24"
          MIN_KEYWORD_POOL: "18"

          CLUSTER_MODE: "1"
          CLUSTER_BATCH: "12"
          CLUSTER_ROTATION_WINDOW: "18"

          PILLAR_INTERVAL: "8"

          GOOGLE_SUGGEST_ENABLED: "1"
          GOOGLE_SUGGEST_MAX_SEEDS: "8"
          GOOGLE_SUGGEST_PER_QUERY: "8"

          RELATED_POST_LIMIT: "4"

          UNSPLASH_MIN_WIDTH: "2000"
          UNSPLASH_MIN_HEIGHT: "1200"
          UNSPLASH_MIN_LIKES: "60"
          UNSPLASH_PER_PAGE: "30"

        run: |
          python tools/auto_post.py

      - name: Build sitemap
        env:
          SITE_URL: "https://mingmonglife.com"
        run: |
          python tools/build.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto post"
          git pull --rebase origin main
          git push origin HEAD:main
