name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean invisible spaces in auto_post.py
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/auto_post.py")
          text = path.read_text(encoding="utf-8")
          for bad in ["\u00A0", "\u2007", "\u202F"]:
              text = text.replace(bad, " ")
          path.write_text(text, encoding="utf-8")
          print("Cleaned invisible spaces from", path)
          PY

      - name: Check syntax
        run: |
          python -m py_compile tools/auto_post.py

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          SITE_NAME: "MingMongLife"
          SITE_URL: "https://mingmonglife.com"
          POSTS_PER_RUN: "1"
          MODEL_PLANNER: "gpt-4o-mini"
          MODEL_WRITER: "gpt-4o"
          MIN_CHARS: "4200"
          MIN_SECTION_CHARS: "220"
          MAX_SECTION_CHARS: "980"
          MAX_CHARS: "6200"
          MAX_KEYWORD_TRIES: "18"
          MAX_GENERATE_ATTEMPTS: "8"
          TITLE_SIM_THRESHOLD: "0.90"
          KEYWORD_SIM_THRESHOLD: "0.84"
          TOPIC_SIM_THRESHOLD: "0.74"
          MIN_KEYWORD_POOL: "20"
          CLUSTER_MODE: "1"
          CLUSTER_BATCH: "14"
          CLUSTER_ROTATION_WINDOW: "16"
          PILLAR_INTERVAL: "5"
          GOOGLE_SUGGEST_ENABLED: "1"
          GOOGLE_SUGGEST_MAX_SEEDS: "8"
          GOOGLE_SUGGEST_PER_QUERY: "8"
          GOOGLE_SUGGEST_SCORE_THRESHOLD: "-0.10"
          RELATED_POST_LIMIT: "4"
          SECTION_COUNT_MIN: "6"
          SECTION_COUNT_MAX: "6"
          UNSPLASH_MIN_WIDTH: "1600"
          UNSPLASH_MIN_HEIGHT: "900"
          UNSPLASH_MIN_LIKES: "40"
          UNSPLASH_PER_PAGE: "20"
        run: |
          python -u tools/auto_post.py

      - name: Build sitemap
        env:
          SITE_URL: "https://mingmonglife.com"
        run: |
          python tools/build.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto post"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
