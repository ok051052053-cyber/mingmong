name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *" # 매일 01:20 UTC (KST 10:20)

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SITE_NAME: MingMong
          SITE_URL: https://mingmonglife.com
          POSTS_PER_RUN: 1
          IMG_COUNT: 4
          MIN_CHARS: 2800
          MODEL: gpt-4o-mini

          # Unsplash quality
          UNSPLASH_MIN_WIDTH: 2000
          UNSPLASH_MIN_HEIGHT: 1200
          UNSPLASH_MIN_LIKES: 60
          UNSPLASH_PER_PAGE: 30

          # 안정성
          MAX_KEYWORD_TRIES: 12
        run: |
          python tools/auto_post.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 원격 최신 반영 (push reject 방지)
          git fetch origin main
          git rebase origin/main || (git rebase --abort && git pull --rebase origin main)

          git add -A

          # 변경 없으면 종료
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto post"

          # 안전 push
          git push origin HEAD:main
