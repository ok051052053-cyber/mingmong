name: Pinterest Auto

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"  # 매일 UTC 02:30 = KST 11:30

permissions:
  contents: write

jobs:
  pinterest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Prepare folders
        run: |
          mkdir -p pinterest_images
          mkdir -p data
          test -f data/pinterest_uploaded.json || echo "[]" > data/pinterest_uploaded.json

      - name: Run Pinterest dry run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_DAILY_LIMIT: 10

          PINTEREST_BOARD_AI_TOOLS: ${{ secrets.PINTEREST_BOARD_AI_TOOLS }}
          PINTEREST_BOARD_SIDE_HUSTLES: ${{ secrets.PINTEREST_BOARD_SIDE_HUSTLES }}
          PINTEREST_BOARD_MAKE_MONEY: ${{ secrets.PINTEREST_BOARD_MAKE_MONEY }}
          PINTEREST_BOARD_INVESTING: ${{ secrets.PINTEREST_BOARD_INVESTING }}
          PINTEREST_BOARD_SOFTWARE_REVIEWS: ${{ secrets.PINTEREST_BOARD_SOFTWARE_REVIEWS }}
          PINTEREST_BOARD_PRODUCTIVITY: ${{ secrets.PINTEREST_BOARD_PRODUCTIVITY }}
        run: |
          python tools/pinterest_auto.py
