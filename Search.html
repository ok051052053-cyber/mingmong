<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search | MingMong</title>
<meta name="description" content="Search articles on MingMong." />
<link rel="stylesheet" href="style.css?v=8" />
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html">
      <span class="mark"></span>
      <span>MingMong</span>
    </a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top:28px;padding-bottom:48px;">
  <section class="home-block">
    <div class="home-block-head">
      <h1 class="home-h2">Search articles</h1>
      <p class="home-sub">Find posts by keyword, topic, or category.</p>
    </div>

    <form class="site-search-form search-bar search-bar--page">
      <input
        id="search-input"
        type="search"
        name="q"
        placeholder="Search posts, tools, workflows..."
        autocomplete="off"
      />
      <button type="submit" class="btn primary">Search</button>
    </form>
  </section>

  <section class="home-block">
    <div id="search-results" class="latest-grid"></div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div>© 2026 MingMong</div>
    <div class="footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script src="search.js"></script>
</body>
</html>
